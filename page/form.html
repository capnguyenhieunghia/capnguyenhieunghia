<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<style>
    * {
        padding: 0;
        margin: 0;
        box-sizing: border-box;
    }

    body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        background-image: url(https://wallpaperaccess.com/full/6673402.jpg);
        background-size: cover;
        background-repeat: no-repeat;
    }

    h2 {
        color: transparent;
        font-size: 30px;
        background-clip: text;
        background-image: linear-gradient(to top, #30cfd0 0%, #330867 100%);
        font-weight: bold;
    }

    .form {
        margin: 0 auto;
        border-radius: 15px;
        width: 500px;
        height: 500px;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        flex-wrap: wrap;
        row-gap: 25px;
        background-color: hsla(249, 100%, 99%, 0.6);
        box-shadow: rgba(60, 64, 67, 0.3) 0px 1px 2px 0px, rgba(60, 64, 67, 0.15) 0px 2px 6px 2px;
    }

    .form input {
        width: 300px;
        height: 50px;
        border: none;
        border-bottom: solid black 1px;
        background: none;
    }

    .form input:focus {
        outline: none;
        color: #330867;
        font-size: 15px;
    }

    .form label {
        font-size: 18px;
    }

    .form .name,
    .sdt,
    .noidung,
    .gmail {
        height: 50px;
        display: flex;
        flex-direction: column;
    }

    .gui {
        width: 150px;
        border-radius: 4px;
        height: 32px;
        background: none;
        border: none;
        text-align: center;
        padding: 5px;
        background-image: linear-gradient(-20deg, #e9defa 0%, #fbfcdb 100%);
    }

    .gui a {
        font-size: 17px;
        text-decoration: none;
        font-weight: bold;
    }
</style>

<body>
    <div class="form">
        <h2>FORM</h2>
        <!-- Tên -->
        <div class="name">
            <label for="">Tên</label>
            <input type="text" name="" id="">
        </div>
        <!-- Số Điện Thoại -->
        <div class="sdt">
            <label for="">Số Điện Thoai</label>
            <input type="number" name="" id="">
        </div>
        <!-- Email -->
        <div class="gmail">
            <label for="">Gmail</label>
            <input type="email" name="" id="">
        </div>
        <!-- Nôi Dung -->
        <div class="noidung">
            <label for="">Nội Dung</label>
            <input type="text" name="" id="">
        </div>
        <!-- Nút -->
        <div class="gui"><a href="">Gửi</a></div>
    </div>
</body>

</html>
