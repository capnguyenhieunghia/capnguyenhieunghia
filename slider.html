<!DOCTYPE html>
<html>
<head>
<style>
  .slideshow-container {
    position: relative;
    max-width: 1000px;
    margin: auto;
  }

  .mySlides {
    display: none;
    width: 100%;
    height: auto;
  }

  .slideshow-container img {
    width: 100%;
    height: auto;
  }
</style>
</head>
<body>

<div class="slideshow-container">
  <div class="mySlides">
    <img src="https://th.bing.com/th/id/OIP.OrbLP8hd8BzSx3t26cGZAQHaEK?w=305&h=180&c=7&r=0&o=5&dpr=1.3&pid=1.7" alt="Image 1">
  </div>

  <div class="mySlides">
    <img src="https://th.bing.com/th/id/OIP.3IJxsfi4wErDMAGWGL4GRAHaEL?rs=1&pid=ImgDetMain" alt="Image 2">
  </div>
  <div class="mySlides">
    <img src="https://th.bing.com/th/id/OIP.OVUtPepwEqUuUIUtwO8lngHaH3?w=167&h=180&c=7&r=0&o=5&dpr=1.3&pid=1.7" alt="Image 2">
  </div>
  <div class="mySlides">
    <img src="https://th.bing.com/th/id/OIP.UwmsfIkrgfBuPhrZTzCEWwHaEO?w=301&h=180&c=7&r=0&o=5&dpr=1.3&pid=1.7" alt="Image 2">
  </div>

  <!-- Thêm các div mySlides khác cho các ảnh còn lại -->

</div>

<script>
  var slideIndex = 0;
  showSlides();

  function showSlides() {
    var i;
    var slides = document.getElementsByClassName("mySlides");
  
    for (i = 0; i < slides.length; i++) {
      slides[i].style.display = "none";
    }
  
    slideIndex++;
  
    if (slideIndex > slides.length) {
      slideIndex = 1;
    }
  
    slides[slideIndex - 1].style.display = "block";
  
    setTimeout(showSlides, 2000); // Thời gian trượt slide (2000ms = 2 giây)
  }
</script>

</body>
</html>
