<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    .section {
        display: none;
    }

    .section.active {
        display: block;
    }

    #menu {
        list-style: none;
        display: flex;
        justify-content: space-between;
    }

    .menu-btn {
        background: none;
        border: none;
        cursor: pointer;
        font-weight: bold;
        text-decoration: underline;
    }
</style>

<body>
    <ul id="menu">
        <li><button class="menu-btn" data-target="section1">Home</button></li>
        <li><button class="menu-btn" data-target="section2">About</button></li>
        <li><button class="menu-btn" data-target="section3">Contact</button></li>
    </ul>

    <div id="section1" class="section">
        <h2>Phần 1</h2>
        <p>Nội dung phần 1</p>
    </div>

    <div id="section2" class="section">
        <h2>Phần 2</h2>
        <p>Nội dung phần 2</p>
    </div>

    <div id="section3" class="section">
        <h2>Phần 3</h2>
        <p>Nội dung phần 3</p>
    </div>
</body>
<script>window.addEventListener('load', function () {
        var menuButtons = document.querySelectorAll('.menu-btn');
        var sections = document.querySelectorAll('.section');

        menuButtons.forEach(function (button) {
            button.addEventListener('click', function () {
                var target = button.dataset.target;

                sections.forEach(function (section) {
                    if (section.id === target) {
                        section.classList.add('active');
                    } else {
                        section.classList.remove('active');
                    }
                });
            });
        });
    });</script>

</html>
